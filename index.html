<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYK Yemek</title>
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/freddiechill/gorsel-depom/refs/heads/main/kykyemek_20251122_043032_0000.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/freddiechill/gorsel-depom/refs/heads/main/kykyemek_20251122_043032_0000.png">
    
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* --- TEMEL AYARLAR --- */
        * { 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
            scrollbar-width: none;
            -ms-overflow-style: none;
            box-sizing: border-box;
        }
        ::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Satoshi', sans-serif; font-weight: 700; background-color: #121212; color: #e0e0e0;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: background-color 0.3s; -webkit-user-select: none; user-select: none;
        }

        /* --- ANİMASYONLAR --- */
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100%); opacity: 0; } }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes zoomOut { from { transform: scale(1); opacity: 1; } to { transform: scale(0.9); opacity: 0; } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        
        @keyframes flashRed { 
            0% { background-color: rgba(239, 83, 80, 0.6); border-color: #ef5350; } 
            50% { background-color: rgba(239, 83, 80, 0.3); }
            100% { background-color: #252525; border-color: #333; } 
        }
        @keyframes highlightRow { 0% { background-color: rgba(255, 215, 0, 0.4); } 100% { background-color: transparent; } }

        .anim-slide-up { animation: slideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        .anim-slide-down { animation: slideDown 0.4s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        .anim-zoom-in { animation: zoomIn 0.3s ease-out forwards; }
        .anim-zoom-out { animation: zoomOut 0.3s ease-in forwards; }
        .anim-pop { animation: pop 0.3s ease-out; }
        .row-highlight { animation: highlightRow 2s ease-out forwards; }

        /* --- ÜST BAR --- */
        #auth-container { 
            position: absolute; top: 20px; right: 20px; z-index: 6000; 
            display: flex; align-items: center; gap: 12px;
        }

        .notif-btn {
            position: relative; width: 40px; height: 40px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; 
            display: none; 
            align-items: center; justify-content: center; 
            cursor: pointer; color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.2s;
        }
        .notif-btn:active { transform: scale(0.9); }
        .notif-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .notif-badge {
            position: absolute; top: -2px; right: -2px; 
            width: 10px; height: 10px; background-color: #ef5350; 
            border-radius: 50%; border: 2px solid #121212; 
            display: none;
        }

        .login-btn {
            background: transparent; padding: 0; border: 2px solid #fff;
            width: 42px; height: 42px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s; overflow: hidden;
        }
        .login-btn.text-mode { 
            width: auto; height: 38px; padding: 0 15px; 
            background: #fff; color: #333; border: none; border-radius: 20px;
            font-weight: 900; font-size: 0.85rem; font-family: 'Satoshi', sans-serif;
        }
        
        .login-btn:active { transform: scale(0.95); }
        .user-avatar { width: 100%; height: 100%; object-fit: cover; display: flex; align-items: center; justify-content: center; background: #ccc; color: #555; font-size: 14px;}

        /* --- MODALLER --- */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 7000; align-items: center; justify-content: center;
        }
        
        #adminModal, #historyModal { z-index: 8000; }

        .auth-box { 
            background: #1e1e1e; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; 
            border: 1px solid #333; text-align: center; position: relative; 
        }

        #notificationModal .auth-box, #historyModal .auth-box { 
            max-width: 380px; height: 60vh; display: flex; flex-direction: column; padding: 0; overflow: hidden;
        }

        #adminModal .auth-box, #profileModal .auth-box, #authModal .auth-box {
            max-width: 380px; height: auto; max-height: 85vh; 
            display: flex; flex-direction: column; padding: 20px; overflow: hidden;
        }
        
        /* KAYDIRILABİLİR ALANLAR (Sihirli Dokunuşlar Eklendi) */
        .scrollable-form {
            overflow-y: auto; width: 100%; padding-right: 5px;
            min-height: 0; /* Flex taşmasını önler */
            -webkit-overflow-scrolling: touch; /* iOS pürüzsüz kaydırma */
            overscroll-behavior-y: contain;
        }

        #fullListModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 9000; padding: 20px; padding-top: 80px; 
            background: #121212; box-sizing: border-box; flex-direction: column;
        }

        .notif-header { padding: 15px; border-bottom: 1px solid #333; font-size: 1.1rem; font-weight: bold; text-align: center; background: #222; width: 100%; box-sizing: border-box;}
        
        #adminModal .notif-header, #profileModal .header-bar {
            background: transparent; border-bottom: 1px solid #333; 
            margin-bottom: 20px; padding: 10px 0 15px 0; min-height: 40px;
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        
        .header-title { font-size: 1.2rem; color: #fff; font-weight: bold; }
        
        .header-icon-right { position: absolute; right: 0; top: 0; color: #888; cursor: pointer; padding: 5px; transition: color 0.2s; }
        .header-icon-right:hover { color: #fff; }

        .notif-list { 
            flex: 1; overflow-y: auto; padding: 0; margin: 0; list-style: none; width: 100%;
            min-height: 0; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain;
        }
        .notif-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; flex-direction: column; gap: 5px; background: #1e1e1e; transition: background 0.2s; text-align: left; }
        .notif-item:hover { background: #252525; }
        .notif-item.unread { background: #2a1a1a; border-left: 4px solid #ef5350; }
        .notif-text { font-size: 0.9rem; color: #ddd; line-height: 1.4; }
        .notif-text b { color: #fff; }
        .notif-time { font-size: 0.75rem; color: #888; align-self: flex-end; }
        .notif-empty { padding: 20px; text-align: center; color: #888; }

        /* --- COMMENT HISTORY --- */
        .hist-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; text-align: left; transition: background 0.2s; }
        .hist-item:hover { background: #252525; }
        .hist-text { font-size: 0.95rem; color: #eee; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .hist-meta { font-size: 0.75rem; color: #888; display: flex; justify-content: space-between; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }

        /* --- ADMIN / USER INFO PANEL --- */
        .admin-content { padding: 5px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; overflow-y: auto; position: relative; min-height: 0; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
        .user-info-text { color: #888; font-size: 0.8rem; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
        .user-info-val { color: #fff; font-size: 1rem; font-weight: bold; margin-bottom: 15px; text-align: center; line-height: 1.3; }

        /* --- CARD & CAROUSEL --- */
        .left-controls { position: absolute; top: 20px; left: 20px; z-index: 9500; }
        
        .icon-btn { background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .icon-btn:active { transform: scale(0.9); background: #333; }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; pointer-events: none; display: block; }

        .carousel-container { position: relative; width: 100%; height: 100vh; perspective: 1000px; display: flex; align-items: center; justify-content: center; touch-action: pan-y; overflow: hidden; }
        
        .menu-card { position: absolute; top: 54%; left: 50%; width: 85%; max-width: 380px; display: flex; flex-direction: column; align-items: center; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s; pointer-events: none; }
        .menu-card-inner { background: #1e1e1e; border-radius: 24px; border: 2px solid #333; box-shadow: 0 15px 40px rgba(0,0,0,0.6); display: flex; flex-direction: column; overflow: hidden; width: 100%; height: auto; max-height: 65vh; pointer-events: auto; transition: border-color 0.3s; padding-bottom: 10px;}
        
        /* Tarihi kartın yüksekliğinden bağımsız olarak her zaman hemen üstünde tutar */
        .menu-card-date { position: absolute; bottom: 100%; left: 0; width: 100%; font-size: 1.15rem; color: #fff; margin-bottom: 12px; text-shadow: 0 4px 12px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.4s; font-weight: 700; text-align: center; pointer-events: none; }

        .pos-2 { z-index: 30; transform: translate(-50%, -50%) scale(1); opacity: 1; }
        /* Eksik olan satır buydu, tarihin sadece öndeki kartta görünmesini sağlar */
        .pos-2 .menu-card-date { opacity: 1; }
        
        .pos-1 { z-index: 20; transform: translate(-85%, -50%) scale(0.85); opacity: 0.5; pointer-events: none; }
        .pos-3 { z-index: 20; transform: translate(-15%, -50%) scale(0.85); opacity: 0.5; pointer-events: none; }
        .pos-0 { z-index: 10; transform: translate(-150%, -50%) scale(0.7); opacity: 0; }
        .pos-4 { z-index: 10; transform: translate(50%, -50%) scale(0.7); opacity: 0; }

        .card-header { border-radius: 22px 22px 0 0; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid #333; min-height: 50px; flex-shrink: 0; }
        .meal-title { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }
        .switch-btn { background: #333; color: #fff; border: none; padding: 6px 12px; border-radius: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'Satoshi', sans-serif; font-size: 0.8rem; }
        .pos-2 .switch-btn { opacity: 1; pointer-events: auto; }

        ul { list-style: none; padding: 10px 0; margin: 0; overflow-y: auto; flex: 1; }
        li { padding: 12px 20px; border-bottom: 1px solid #2c2c2c; font-size: 1.05rem; text-align: center; color: #ddd; }
        li:last-child { border-bottom: none; }

        .social-footer { display: flex; justify-content: space-around; align-items: center; padding: 15px 10px; background: #151515; border-top: 1px solid #333; flex-shrink: 0; }
        .social-action { display: flex; flex-direction: column; align-items: center; color: #888; cursor: pointer; transition: color 0.2s; position: relative; width: 60px; flex-shrink: 0; }
        .social-action:active { transform: scale(0.9); }
        .social-action svg { width: 28px; height: 28px; fill: currentColor; display: block; margin-bottom: 4px; }
        .flip-icon { transform: scaleY(-1); }
        .count-text { font-size: 0.8rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        .liked { color: #a5d6a7 !important; } .disliked { color: #ef9a9a !important; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 80px; height: 80vh; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; background: transparent; border: none; color: rgba(255,255,255,0.3); }
        .nav-left { left: 0; justify-content: flex-start; padding-left: 10px; }
        .nav-right { right: 0; justify-content: flex-end; padding-right: 10px; }

        body.theme-breakfast .menu-card-inner { border-color: #fff59d; } body.theme-breakfast .meal-title { color: #fff59d; } body.theme-breakfast .switch-btn { background: #fff59d; color: #121212; }
        body.theme-dinner .menu-card-inner { border-color: #ef9a9a; } body.theme-dinner .meal-title { color: #ef9a9a; } body.theme-dinner .switch-btn { background: #ef9a9a; color: #121212; }

        /* --- AUTH FORMS --- */
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #333; width: 100%; flex-shrink: 0;}
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; color: #888; font-weight: bold; transition: 0.3s; text-align: center;}
        .auth-tab.active { color: #fff; border-bottom: 2px solid #fff; }
        .auth-input, .auth-select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-family: 'Satoshi', sans-serif; outline: none; }
        .auth-select { appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right .7em top 50%; background-size: .65em auto; }
        
        .auth-submit { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #fff; color: #000; font-weight: 900; cursor: pointer; font-family: 'Satoshi', sans-serif; transition: transform 0.2s; flex-shrink: 0;}
        .auth-submit:active { transform: scale(0.95); }
        .auth-close { margin-top: 15px; color: #888; cursor: pointer; font-size: 0.9rem; display: block; text-align: center; flex-shrink: 0;}

        .avatar-upload { 
            width: 90px; 
            height: 90px;
            min-width: 90px;
            min-height: 90px;
            border-radius: 50%; 
            background: #333; 
            margin: 0 auto 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            overflow: hidden; 
            border: 2px dashed #555; 
            position: relative; 
            flex-shrink: 0;
        }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar-upload span { font-size: 0.8rem; color: #888; }
        #profileFileInput, #regFileInput { display: none; }

        /* --- YORUMLAR & FOTOĞRAF YÜKLEME --- */
        .comment-modal { display: none; position: fixed; background: #121212; box-sizing: border-box; flex-direction: column; bottom: 0; left: 0; width: 100%; height: 75vh; border-radius: 24px 24px 0 0; z-index: 7000; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.7); }
        .modal-header { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; color:#fff; font-size:1.2rem; font-weight: bold; position: relative; min-height: 32px; flex-shrink:0; }
        .close-modal-btn { position: absolute; right: 0; top: 0; font-size: 24px; color: #fff; cursor: pointer; width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 1; }
        
        /* Flexbox Scroll Taşma Çözümü */
        .comment-list { flex: 1; overflow-y: auto; margin-bottom: 10px; min-height: 0; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; padding-bottom: 10px;}
        .modal-scroll-area { flex: 1; overflow-y: auto; margin-bottom: 10px; min-height: 0; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; padding-bottom: 20px;}
        
        .single-comment { background: #252525; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; display: flex; flex-direction: column; gap: 8px; position: relative; max-width: 100%; box-sizing: border-box; overflow-wrap: anywhere; word-break: break-word; transition: background 0.5s ease, border-color 0.5s ease; }
        .highlight-comment { animation: flashRed 2s ease-out forwards; }
        
        .reply-comment { margin-left: 35px; background: #1a1a1a; border-left: 2px solid #444; width: calc(100% - 35px); }
        .reply-icon { position: absolute; left: -22px; top: 15px; width: 14px; height: 14px; fill: #777; }
        
        .c-top { display: flex; gap: 10px; width: 100%; }
        .c-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #444; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 14px; cursor: pointer;}
        .c-content { flex: 1; min-width: 0; }
        .c-user { font-size: 0.85rem; color: #ccc; font-weight: bold; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; cursor: pointer; } 
        .c-text { font-size: 0.95rem; color: #fff; line-height: 1.4; }
        .c-image { max-width: 100%; border-radius: 8px; margin-top: 8px; display: block; border: 1px solid #444; }
        
        .badge-icon { width: auto; height: 10px; vertical-align: middle; margin-left: 2px; }
        .mention-text { color: #90caf9; font-weight: bold; margin-right: 5px; }
        .c-actions { display: flex; gap: 15px; margin-left: 46px; align-items: center; }
        .c-action-btn { display: flex; align-items: center; gap: 4px; color: #777; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: color 0.2s; }
        .c-action-btn svg { width: 16px; height: 16px; fill: currentColor; display: block; }
        .c-action-btn:hover { color: #fff; }
        .c-action-btn.c-liked { color: #a5d6a7; }
        .c-action-btn.c-disliked { color: #ef9a9a; }
        .reply-trigger { color: #aaa; font-size: 0.75rem; cursor: pointer; margin-left: auto; margin-right: 5px; font-weight: bold; }
        .reply-trigger:hover { color: #fff; }

        .reply-input-wrapper { display: none; margin-left: 46px; margin-top: 5px; gap: 5px; width: calc(100% - 46px); box-sizing: border-box; }
        .reply-input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #444; background: #121212; color: #fff; font-family: 'Satoshi', sans-serif; font-size: 0.9rem; outline: none; min-width: 0; }
        .reply-send-btn { background: #ef9a9a; border: none; width: 40px; height: 36px; border-radius: 8px; cursor: pointer; color: #121212; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .reply-send-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .time-ago { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; color: #666; font-weight: 500; }
        .single-comment.has-delete .time-ago { right: 32px; }
        .delete-comment-btn { position: absolute; top: 9px; right: 10px; color: #ef5350; cursor: pointer; font-size: 14px; opacity: 0.7; transition: opacity 0.2s; z-index: 5; display: flex; align-items: center; justify-content: center; }
        .delete-comment-btn:hover { opacity: 1; transform: scale(1.1); }
        .delete-comment-btn svg { width: 14px; height: 14px; fill: currentColor; }
        
        .comment-input-container { flex-shrink: 0; display: flex; flex-direction: column; gap: 5px; }
        .comment-input-area { display: flex; gap: 8px; align-items: center;}
        .comment-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #121212; color: #fff; font-family: 'Satoshi', sans-serif; outline: none;}
        
        .image-btn { background: transparent; border: 1px solid #444; border-radius: 10px; width: 44px; height: 44px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#888; transition: color 0.2s; flex-shrink:0;}
        .image-btn:hover { color: #fff; border-color: #888; }
        .image-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .send-btn { background: #ef9a9a; border: none; padding: 0 15px; height: 44px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #121212; display: flex; align-items: center; justify-content: center; flex-shrink:0;}
        .send-btn svg { width: 24px; height: 24px; fill: currentColor; }
        
        .day-row { background: #1e1e1e; margin-bottom: 15px; border-radius: 10px; padding: 15px; border: 1px solid #333; }
        .day-header { font-size: 1.1rem; color: #888; margin-bottom: 10px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .day-content { font-size: 1rem; line-height: 1.6; text-align: center; color: #e0e0e0; white-space: pre-line; }
        .modal-toggle-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .modal-toggle { padding: 10px 20px; border-radius: 10px; border: 1px solid #444; background: #1e1e1e; color: #888; font-family: 'Satoshi', sans-serif; font-weight: 700; cursor: pointer; }
        .modal-toggle.active-yellow { background: #fff59d; color: #121212; border-color: #fff59d; }
        .modal-toggle.active-red { background: #ef9a9a; color: #121212; border-color: #ef9a9a; }

            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const maxSize = 150;
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                    canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
                    tempAvatarBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('profileAvatarPreview').src = tempAvatarBase64;
                    document.getElementById('profileAvatarPreview').style.display = 'block';
                    document.getElementById('avatarLabel').style.display = 'none';
                }; img.src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }

    function listenForNotifications() {
        if(!db) return;
        if (notificationUnsubscribe) notificationUnsubscribe();
        if (!currentUserProfile) return;

        notificationUnsubscribe = onSnapshot(collection(db, 'notifications'), (snap) => {
            const list = document.getElementById('notificationList');
            const badge = document.getElementById('notifBadge');
            let unreadCount = 0;
            let notifs = [];

            snap.forEach(document => {
                const d = document.data();
                if(d.receiverId === currentUserProfile.id) {
                    notifs.push({ id: document.id, ...d });
                }
            });

            if (notifs.length === 0) {
                list.innerHTML = '<div class="notif-empty">Henüz bildirim yok.</div>';
                badge.style.display = 'none';
                return;
            }
            
            notifs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

            let html = '';
            notifs.forEach(n => {
                if(!n.read) unreadCount++;
                const isUnread = !n.read ? 'unread' : '';
                const time = timeAgo(n.createdAt);
                let text = '';
                if(n.type === 'like') text = `<b>${n.senderName}</b> yorumunu beğendi.`;
                if(n.type === 'reply') text = `<b>${n.senderName}</b> yorumuna yanıt verdi.`;
                
                html += `
                    <div class="notif-item ${isUnread}" onclick="readNotification('${n.id}', '${n.docId}', '${n.commentId}')">
                        <div class="notif-text">${text}</div>
                        <div class="notif-time">${time}</div>
                    </div>
                `;
            });

            list.innerHTML = html;
            badge.style.display = unreadCount > 0 ? 'block' : 'none';
        });
    }

    }
    
    function updateTheme() { 
        document.body.className = currentMeal === 'breakfast' ? 'theme-breakfast' : 'theme-dinner'; 
    }

    function renderAllCards(centerDateIdx) {
        if(cards.length === 0 || !cards[0]) return; 

        for (let i = 0; i < 5; i++) {
            const domIndex = cardPositions[i]; const dateOffset = i - 2; const targetDateIdx = getLoopedIndex(centerDateIdx + dateOffset); const card = cards[domIndex];
            if(!card) continue;
            card.innerHTML = `
                <div class="menu-card-date">${menuData[targetDateIdx].date}</div>
                <div class="menu-card-inner">
                    <div class="card-header"><div class="meal-title">${currentMeal === 'breakfast' ? 'KAHVALTI' : 'AKŞAM'}</div><button class="switch-btn ${i===2?'':'hidden-btn'}" onclick="toggleMealType()"><span class="switch-text">${currentMeal === 'breakfast' ? 'Akşama Geç' : 'Kahvaltıya Geç'}</span><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16.01 11H4v2h12.01v3L20 12l-3.99-4z"/></svg></button></div>
                    <ul>${getMenuHtml(targetDateIdx)}</ul>
                    <div class="social-footer">
                        <div class="social-action" onclick="handleVote(${targetDateIdx}, 'like')"><svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.99-.01z"/></svg><span class="count-text" id="like-count-${targetDateIdx}">0</span></div>
                        <div class="social-action" onclick="handleVote(${targetDateIdx}, 'dislike')"><svg viewBox="0 0 24 24" class="flip-icon"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.99-.01z"/></svg><span class="count-text" id="dislike-count-${targetDateIdx}">0</span></div>
                        <div class="social-action" onclick="openComments(${targetDateIdx})"><button class="notif-btn anim-pop" style="display:none"></button> <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg><span class="count-text" id="comment-count-${targetDateIdx}">0</span></div>
                    </div>
                </div>`;
            if(i===2) { fetchStats(targetDateIdx); }
        }
    }

    const initUI = () => {
        cards = [
            document.getElementById('c0'),
            document.getElementById('c1'),
            document.getElementById('c2'),
            document.getElementById('c3'),
            document.getElementById('c4')
        ];

        const today = new Date(); 
        if(today.getMonth() !== 4 || today.getFullYear() !== 2026) currentDayIndex = 1; 
        
        updateTheme(); 
        renderAllCards(currentDayIndex); 
        applyClasses();
        
        const eyeIcon = document.getElementById('icon-eye'), eyeOffIcon = document.getElementById('icon-eye-off');
        if(eyeIcon && eyeOffIcon) { eyeIcon.style.display = 'block'; eyeOffIcon.style.display = 'none'; }

        const carousel = document.getElementById('carouselTouchArea'); 
        if(carousel) {
            carousel.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true}); 
            carousel.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, {passive: true}); 
        }
    };

    window.moveCarousel = (direction) => { if(direction===1) { cardPositions.push(cardPositions.shift()); currentDayIndex = getLoopedIndex(currentDayIndex+1); } else { cardPositions.unshift(cardPositions.pop()); currentDayIndex = getLoopedIndex(currentDayIndex-1); } renderAllCards(currentDayIndex); applyClasses(); }
    window.toggleMealType = () => { currentMeal = currentMeal === 'dinner' ? 'breakfast' : 'dinner'; updateTheme(); renderAllCards(currentDayIndex); }
    
    window.renderFullList = (mealType) => {
        const container = document.getElementById('fullListContainer'); 
        const btnBreakfast = document.getElementById('modalBtnBreakfast'); 
        const btnDinner = document.getElementById('modalBtnDinner'); 
        container.innerHTML = ''; 
        btnBreakfast.className = 'modal-toggle'; 
        btnDinner.className = 'modal-toggle';
        if (mealType === 'breakfast') btnBreakfast.classList.add('active-yellow'); else btnDinner.classList.add('active-red');
        for (let i = 1; i <= 31; i++) { 
            const dayData = menuData[i]; 
            if (dayData) { 
                const div = document.createElement('div'); div.className = 'day-row'; 
                div.innerHTML = `<div class="day-header">${dayData.date}</div><div class="day-content">${dayData[mealType].join('<br>')}</div>`; 
                container.appendChild(div); 
            } 
        }
    }

    function fetchStats(dayIdx) { 
        if(!db) return;
        const docId = `${currentMeal}_${CURRENT_MONTH_TAG}_${dayIdx}`; 
        
        // Zombi dinleyicileri (memory leak) temizle
        if (currentStatUnsubscribe) {
            currentStatUnsubscribe();
        }

        currentStatUnsubscribe = onSnapshot(doc(db, 'daily_stats', docId), (docSnap) => { 
            if(docSnap.exists()) { 
                const data = docSnap.data(); 
                const likeEl = document.getElementById(`like-count-${dayIdx}`); 
                const dislikeEl = document.getElementById(`dislike-count-${dayIdx}`); 
                const commentEl = document.getElementById(`comment-count-${dayIdx}`); 
                if(likeEl) likeEl.innerText = data.likes || 0; 
                if(dislikeEl) dislikeEl.innerText = data.dislikes || 0; 
                if(commentEl) commentEl.innerText = data.commentCount || 0; 
                
                if(currentUserProfile && data.votes && data.votes[currentUserProfile.id]) { 
                    if(data.votes[currentUserProfile.id] === 'like') { 
                        if(likeEl) likeEl.parentElement.classList.add('liked'); 
                        if(dislikeEl) dislikeEl.parentElement.classList.remove('disliked'); 
                    } else { 
                        if(dislikeEl) dislikeEl.parentElement.classList.add('disliked'); 
                        if(likeEl) likeEl.parentElement.classList.remove('liked'); 
                    } 
                } else {
                    if(likeEl) likeEl.parentElement.classList.remove('liked');
                    if(dislikeEl) dislikeEl.parentElement.classList.remove('disliked');
                }
            } else {
                const likeEl = document.getElementById(`like-count-${dayIdx}`); 
                const dislikeEl = document.getElementById(`dislike-count-${dayIdx}`); 
                const commentEl = document.getElementById(`comment-count-${dayIdx}`); 
                if(likeEl) { likeEl.innerText = 0; likeEl.parentElement.classList.remove('liked'); }
                if(dislikeEl) { dislikeEl.innerText = 0; dislikeEl.parentElement.classList.remove('disliked'); }
                if(commentEl) commentEl.innerText = 0;
            }
        }); 
    }

    window.handleVote = (dayIdx, type) => { 
        if(!checkPermission()) return; 
        if(!db) return showToast("Bağlantı hatası", true);

        const eventTarget = event.currentTarget; eventTarget.classList.add('anim-pop'); setTimeout(() => eventTarget.classList.remove('anim-pop'), 300); 
        const ref = doc(db, 'daily_stats', `${currentMeal}_${CURRENT_MONTH_TAG}_${dayIdx}`); 
        
        runTransaction(db, async (t) => { 
            const docSnap = await t.get(ref); 
            if(!docSnap.exists()) { t.set(ref, { likes: 0, dislikes: 0, commentCount: 0, votes: {} }); } 
            const data = docSnap.data() || { likes: 0, dislikes: 0, commentCount: 0, votes: {} }; 
            const votes = data.votes || {}; 
            const current = votes[currentUserProfile.id]; 
            let likes = data.likes || 0; let dislikes = data.dislikes || 0; 
            if(current === type) { 
                if(type === 'like') likes--; else dislikes--; delete votes[currentUserProfile.id]; 
            } else { 
                if(current === 'like') likes--; if(current === 'dislike') dislikes--; 
                if(type === 'like') likes++; else dislikes++; votes[currentUserProfile.id] = type; 
            } 
            t.update(ref, { likes, dislikes, votes }); 
        }).catch(e => console.error(e)); 
    }
    
    let activeCommentDay = 0;
    window.openComments = (dayIdx) => { activeCommentDay = dayIdx; document.getElementById('commentModal').style.display = 'flex'; loadComments(dayIdx); }
    
    function loadComments(dayIdx) { 
        const list = document.getElementById('commentList'); list.innerHTML = '<div style="text-align:center; color:#888; margin-top:20px;">Yükleniyor...</div>'; 
        if(!db) { list.innerHTML = '<div style="text-align:center; color:#888;">Veritabanı bağlantısı kurulamadı.</div>'; return; }

        const docId = `${currentMeal}_${CURRENT_MONTH_TAG}_${dayIdx}`; 
        
        // Zombi dinleyicileri (memory leak) temizle
        if (currentCommentsUnsubscribe) {
            currentCommentsUnsubscribe();
        }

        currentCommentsUnsubscribe = onSnapshot(collection(db, 'comments'), (snapshot) => { 
            let allComments = []; 
            snapshot.forEach(document => { 
                const d = document.data();
                if(d.docId === docId) allComments.push({ id: document.id, ...d }); 
            }); 
            
            list.innerHTML = ''; 
            if(allComments.length === 0) { list.innerHTML = '<div style="text-align:center; color:#888;">Henüz yorum yok.</div>'; return; } 
            
            let rootComments = allComments.filter(c => !c.parentId).sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)); 
            const getChildren = (parentId) => allComments.filter(c => c.parentId === parentId).sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)); 
            
            const renderTree = (comment) => { 
                let html = createCommentHTML(comment, false); 
                let children = getChildren(comment.id); 
                children.forEach(child => { html += createCommentHTML(child, true); html += renderChildrenOf(child); }); 
                return html; 
            }; 
            const renderChildrenOf = (parent) => { 
                let html = ''; let children = getChildren(parent.id); children.forEach(child => { html += createCommentHTML(child, true); html += renderChildrenOf(child); }); 
                return html; 
            }; 
            rootComments.forEach(root => { list.innerHTML += renderTree(root); }); 
            
            if(scrollTargetId) { 
                setTimeout(() => { const el = document.getElementById('comment-'+scrollTargetId); if(el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('highlight-comment'); setTimeout(() => el.classList.remove('highlight-comment'), 2000); } scrollTargetId = null; }, 500); 
            } 
        }); 
    }

    function timeAgo(date) { 
        if (!date) return ''; 
        const dateObj = date.toDate ? date.toDate() : new Date(date);
        const seconds = Math.floor((new Date() - dateObj) / 1000); 
        let interval = seconds / 31536000; if (interval > 1) return Math.floor(interval) + "y"; interval = seconds / 2592000; if (interval > 1) return Math.floor(interval) + "ay"; interval = seconds / 86400; if (interval > 1) return Math.floor(interval) + "g"; interval = seconds / 3600; if (interval > 1) return Math.floor(interval) + "sa"; interval = seconds / 60; if (interval > 1) return Math.floor(interval) + "dk"; 
        return "Şimdi"; 
    }

    function createCommentHTML(c, isReply) { 
        let avatarHtml = '';
        let badgeHtml = ''; 
        
        const uName = c.userName ? c.userName.toLowerCase() : '';
        if(uName === 'freddie') { 
            badgeHtml = '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#FFD700;margin-left:4px;vertical-align:text-bottom;"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg>'; 
        } else if (uName === 'saya') {
            badgeHtml = '<img src="https://raw.githubusercontent.com/freddiechill/gorsel-depom/59349c4a1cbc0e97cc30e17192a4f1bf024fa852/seytan-boynuz.svg" class="badge-icon" alt="badge">';
        }
        
        let deleteBtn = ''; 
        if(currentUser && (currentUser.uid === c.userId || currentUser.email === 'yenerarda7@gmail.com')) { 
            deleteBtn = `<span class="delete-comment-btn" onclick="deleteComment('${c.id}', '${c.docId}')"><i class="fas fa-trash"></i></span>`; 
        } 
        
        let replyBtn = ''; 
        if(currentUserProfile) { replyBtn = `<div class="reply-trigger" onclick="toggleReplyBox('${c.id}')">YANITLA</div>`; } 
        let replyClass = isReply ? 'reply-comment' : ''; let replyIcon = isReply ? '<svg class="reply-icon" viewBox="0 0 24 24"><path d="M19 7v4H5.83l3.58-3.59L8 6l-6 6 6 6 1.41-1.41L5.83 13H21V7z"/></svg>' : ''; 
        let mentionHtml = c.replyTo ? `<span class="mention-text">@${c.replyTo}</span>` : ''; let timeString = timeAgo(c.createdAt); let hasDelete = (deleteBtn !== '') ? 'has-delete' : ''; 
        const clickAttr = `onclick="handleUserClick('${c.userId}', '${c.userName}', '${c.userPhoto || ''}')"`; 
        if(c.userPhoto) { 
            avatarHtml = `<img src="${c.userPhoto}" class="c-avatar" ${clickAttr}>`; 
        } else { 
            avatarHtml = `<div class="c-avatar" ${clickAttr} style="display:flex;align-items:center;justify-content:center;color:#555;background:#ccc;font-weight:bold;font-size:14px;cursor:pointer;">${c.userName.charAt(0).toUpperCase()}</div>`; 
        } 

        let cImageHtml = c.image ? `<img src="${c.image}" class="c-image">` : '';

        return `<div class="single-comment ${replyClass} ${hasDelete}" id="comment-${c.id}">${replyIcon}<div class="time-ago">${timeString}</div>${deleteBtn}<div class="c-top">${avatarHtml}<div class="c-content"><div class="c-user" onclick="handleUserClick('${c.userId}', '${c.userName}', '${c.userPhoto}')">${c.userName}${badgeHtml}</div><div class="c-text">${mentionHtml}${c.text}${cImageHtml}</div></div></div><div class="c-actions"><div class="c-action-btn" onclick="handleCommentVote('${c.id}', 'like', '${c.userId}')"><svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.99-.01z"/></svg><span id="clike-${c.id}">${c.likes || 0}</span></div><div class="c-action-btn" onclick="handleCommentVote('${c.id}', 'dislike', '${c.userId}')"><svg viewBox="0 0 24 24" class="flip-icon"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.99-.01z"/></svg><span id="cdislike-${c.id}">${c.dislikes || 0}</span></div>${replyBtn}</div><div id="reply-box-${c.id}" class="reply-input-wrapper"><input type="text" id="reply-input-${c.id}" class="reply-input" placeholder="Yanıt yaz..."><button class="reply-send-btn" onclick="postReply('${c.id}', '${c.docId}', '${c.userName}', '${c.userId}')"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button></div></div>`; 
    }
    
    window.toggleReplyBox = (commentId) => { const box = document.getElementById(`reply-box-${commentId}`); if(box.style.display === 'flex') box.style.display = 'none'; else box.style.display = 'flex'; }
    
    const updateCommentCount = async (docId, change) => {
        const statRef = doc(db, 'daily_stats', docId);
        try {
            await runTransaction(db, async (t) => {
                const docSnap = await t.get(statRef);
                if (!docSnap.exists()) {
                    if (change > 0) t.set(statRef, { likes: 0, dislikes: 0, commentCount: change, votes: {} });
                } else {
                    let newCount = Math.max(0, (docSnap.data().commentCount || 0) + change);
                    t.update(statRef, { commentCount: newCount });
                }
            });
        } catch(e) { console.error("Sayac guncellenemedi", e); }
    };

    window.postReply = async (parentId, docId, replyToUser, replyToUserId) => { 
        if(!checkPermission()) return; 
        if(!db) return showToast("Bağlantı hatası", true);

        const input = document.getElementById(`reply-input-${parentId}`); 
        const text = input.value.trim(); 
        if(!text) return; 
        
        try {
            await addDoc(collection(db, 'comments'), { 
                docId: docId, text: text, userId: currentUserProfile.id, userName: currentUserProfile.nick, userPhoto: currentUserProfile.photoBase64 || null, likes: 0, dislikes: 0, votes: {}, parentId: parentId, replyTo: replyToUser, createdAt: serverTimestamp() 
            });
            await updateCommentCount(docId, 1);
            if(replyToUserId) sendNotification(replyToUserId, 'reply', docId, parentId);
            input.value = ''; toggleReplyBox(parentId); 
        } catch(e) { console.error(e); }
    }
    
    window.deleteComment = async (commentId, docId) => { 
        if(!db) return;
        try {
            await deleteDoc(doc(db, 'comments', commentId));
            await updateCommentCount(docId, -1);
            showToast("Yorum silindi.");
        } catch(e) { console.error(e); }
    }
    
    window.handleCommentVote = async (commentId, type, ownerId) => { 
        if(!checkPermission()) return; 
        if(!db) return showToast("Bağlantı hatası", true);

        const eventTarget = event.currentTarget; eventTarget.classList.add('anim-pop'); setTimeout(() => eventTarget.classList.remove('anim-pop'), 300); 
        
        const ref = doc(db, 'comments', commentId); 
        runTransaction(db, async (t) => { 
            const docSnap = await t.get(ref); 
            if(!docSnap.exists()) return { success: false }; 
            const data = docSnap.data(); 
            const votes = data.votes || {}; const current = votes[currentUserProfile.id]; 
            let likes = data.likes || 0; let dislikes = data.dislikes || 0; let shouldNotify = false; 
            if(current === type) { 
                if(type === 'like') likes--; else dislikes--; delete votes[currentUserProfile.id]; 
            } else { 
                if(current === 'like') likes--; if(current === 'dislike') dislikes--; 
                if(type === 'like') { likes++; shouldNotify = true; } else dislikes++; votes[currentUserProfile.id] = type; 
            } 
            t.update(ref, { likes, dislikes, votes }); 
            return { success: true, shouldNotify: shouldNotify, docId: data.docId };
        }).then((result) => {
            if(result && result.success && result.shouldNotify && ownerId) { sendNotification(ownerId, 'like', result.docId, commentId); }
        }).catch(e => console.error(e)); 
    }

    let tempCommentImageBase64 = null;

    window.handleCommentImage = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); 
                    const ctx = canvas.getContext('2d'); 
                    const maxSize = 800; 
                    let width = img.width; let height = img.height;
                    
                    if (width > height) { 
                        if (width > maxSize) { height *= maxSize / width; width = maxSize; } 
                    } else { 
                        if (height > maxSize) { width *= maxSize / height; height = maxSize; } 
                    }
                    canvas.width = width; canvas.height = height; 
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    tempCommentImageBase64 = canvas.toDataURL('image/jpeg', 0.6); 
                    
                    document.getElementById('commentImagePreview').src = tempCommentImageBase64;
                    document.getElementById('commentImagePreviewContainer').style.display = 'inline-block';
                }; 
                img.src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
            input.value = ''; 
        }
    };

    window.removeCommentImage = () => {
        tempCommentImageBase64 = null;
        document.getElementById('commentImagePreviewContainer').style.display = 'none';
        document.getElementById('commentImageInput').value = '';
    };

    window.postComment = async () => { 
        if(!checkPermission()) return; 
        if(!db) return showToast("Bağlantı hatası", true);

        const input = document.getElementById('commentInput'); 
        const text = input.value.trim(); 
        
        if(!text && !tempCommentImageBase64) return; 

        const docId = `${currentMeal}_${CURRENT_MONTH_TAG}_${activeCommentDay}`; 
        try {
            await addDoc(collection(db, 'comments'), { 
                docId: docId, 
                text: text, 
                image: tempCommentImageBase64, 
                userId: currentUserProfile.id, 
                userName: currentUserProfile.nick, 
                userPhoto: currentUserProfile.photoBase64 || null, 
                likes: 0, 
                dislikes: 0, 
                votes: {}, 
                createdAt: serverTimestamp() 
            });
            await updateCommentCount(docId, 1);
            input.value = ''; 
            removeCommentImage(); 
        } catch(e) { console.error(e); }
    }

    let touchStartX = 0; let touchEndX = 0; 
    function handleSwipe() { if (touchEndX < touchStartX - 50) moveCarousel(1); if (touchEndX > touchStartX + 50) moveCarousel(-1); }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initUI);
    } else {
        initUI();
    }
</script>

</body>
</html>
